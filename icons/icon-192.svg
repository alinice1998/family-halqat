<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Open Book -->
  <g transform="translate(96,90)">
    <!-- Left page -->
    <path d="M-8,-30 Q-8,-35 -13,-35 L-50,-35 Q-55,-35 -55,-30 L-55,25 Q-55,30 -50,30 L-8,30 Z" fill="rgba(255,255,255,0.9)" stroke="none"/>
    <!-- Right page -->
    <path d="M8,-30 Q8,-35 13,-35 L50,-35 Q55,-35 55,-30 L55,25 Q55,30 50,30 L8,30 Z" fill="rgba(255,255,255,0.85)" stroke="none"/>
    <!-- Spine -->
    <path d="M-8,-35 Q0,-40 8,-35 L8,30 Q0,35 -8,30 Z" fill="rgba(255,255,255,0.7)" stroke="none"/>
    <!-- Text lines left -->
    <line x1="-45" y1="-22" x2="-15" y2="-22" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-45" y1="-12" x2="-18" y2="-12" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-45" y1="-2" x2="-20" y2="-2" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-45" y1="8" x2="-22" y2="8" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-45" y1="18" x2="-25" y2="18" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <!-- Text lines right -->
    <line x1="15" y1="-22" x2="45" y2="-22" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="-12" x2="45" y2="-12" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="20" y1="-2" x2="45" y2="-2" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="22" y1="8" x2="45" y2="8" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="25" y1="18" x2="45" y2="18" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Star/Crescent -->
  <g transform="translate(96,145)">
    <circle cx="0" cy="0" r="12" fill="url(#gold)"/>
    <circle cx="4" cy="-2" r="9" fill="url(#bg)"/>
    <polygon points="16,-4 18,1 23,1 19,4 20,9 16,6 12,9 13,4 9,1 14,1" fill="url(#gold)"/>
  </g>
</svg>
